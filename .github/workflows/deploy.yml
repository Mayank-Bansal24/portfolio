name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production + obfuscated)
        run: npm run build
        env:
          VITE_EMAIL:             ${{ secrets.VITE_EMAIL }}
          VITE_PHONE:             ${{ secrets.VITE_PHONE }}
          VITE_GITHUB:            ${{ secrets.VITE_GITHUB }}
          VITE_LINKEDIN:          ${{ secrets.VITE_LINKEDIN }}
          VITE_CODEFORCES:        ${{ secrets.VITE_CODEFORCES }}
          VITE_CODECHEF:          ${{ secrets.VITE_CODECHEF }}
          VITE_NUCLEUS_LINKEDIN:  ${{ secrets.VITE_NUCLEUS_LINKEDIN }}
          VITE_ODE_LINKEDIN:      ${{ secrets.VITE_ODE_LINKEDIN }}
          VITE_ODE_CERTIFICATE:   ${{ secrets.VITE_ODE_CERTIFICATE }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
